<!doctype html>
<html lang="ru" class="LOLI_SHEET_CLASS">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Loli музыка</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: var(--tg-theme-bg-color, #121212);
      --text: var(--tg-theme-text-color, #f5f5f5);
      --muted: var(--tg-theme-hint-color, #9a9a9f);
      --accent: var(--tg-theme-button-color, #ff3b78);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --accent-rgb: 255 59 120;
      --text-rgb: 245 245 245;
      --player-tabs-offset: 84px;
      --surface: rgb(var(--text-rgb) / .08);
      --surface-strong: rgb(var(--text-rgb) / .13);
      --line: rgb(var(--text-rgb) / .10);
      --danger: #ff5c7a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
    html, body { margin: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); overscroll-behavior: none; }
    body {
      overflow: hidden;
      padding: 0;
    }
    button, input { font: inherit; }
    button { border: 0; background: none; color: inherit; }
    input { user-select: text; -webkit-touch-callout: default; }

    .app { width: 100%; max-width: 720px; height: 100vh; height: 100dvh; height: var(--loli-viewport-height, 100dvh); margin: 0 auto; position: relative; overflow-x: hidden; overflow-y: auto; padding: 0 14px calc(124px + var(--player-tabs-offset) + env(safe-area-inset-bottom)); overscroll-behavior: contain; touch-action: pan-y; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .app::-webkit-scrollbar, .big-queue::-webkit-scrollbar, .sheet-list::-webkit-scrollbar { display: none; }
    .topbar { position: sticky; top: 0; z-index: 15; padding: calc(20px + env(safe-area-inset-top)) 0 10px; margin-bottom: 6px; background: var(--bg); box-shadow: 0 10px 18px var(--bg); }

    .search { display: flex; align-items: center; gap: 10px; height: 44px; border-radius: 14px; background: var(--surface); border: 1px solid var(--line); padding: 0 13px; margin: 0 0 8px; }
    .search svg { opacity: .65; flex: 0 0 auto; }
    .search input { width: 100%; min-width: 0; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 15px; }

    .tabs { position: relative; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 2px; height: 30px; margin-bottom: 0; border-bottom: 1px solid var(--line); }
    .tab { position: relative; height: 29px; border-radius: 0; color: var(--muted); font-size: 12px; font-weight: 760; transition: color .16s ease, transform .16s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab.active { color: var(--accent); }
    .tabs-indicator { position: absolute; left: 9%; bottom: -1px; width: 32%; height: 2px; border-radius: 2px; background: var(--accent); pointer-events: none; transition: left .24s cubic-bezier(.2,.8,.2,1); will-change: left; }
    .tabs-indicator.dragging { transition: none; }
    .tab:active { transform: scale(.97); }
    .view-root { position: relative; z-index: 1; margin: 0; will-change: transform, opacity; }
    #root.view-enter-next { animation: viewEnterNext .24s cubic-bezier(.2,.8,.2,1) both; }
    #root.view-enter-prev { animation: viewEnterPrev .24s cubic-bezier(.2,.8,.2,1) both; }
    .view-ghost { position: absolute; z-index: 2; pointer-events: none; will-change: transform, opacity; }
    .view-ghost.view-exit-next { animation: viewExitNext .24s cubic-bezier(.2,.8,.2,1) both; }
    .view-ghost.view-exit-prev { animation: viewExitPrev .24s cubic-bezier(.2,.8,.2,1) both; }
    .view-swipe-page { position: absolute; z-index: 2; pointer-events: none; will-change: transform; }

    .row-title { display: flex; align-items: end; justify-content: space-between; gap: 10px; margin: 15px 0 8px; }
    .row-title h2 { margin: 0; font-size: 18px; line-height: 1.2; font-weight: 800; }
    .row-title span { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .text-action { height: 30px; padding: 0 10px; border-radius: 10px; background: var(--surface); color: var(--accent); font-size: 12px; font-weight: 780; }

    .playlist-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 11px; }
    .playlist-card { aspect-ratio: 1 / 1; border-radius: 12px; background: var(--surface); border: 1px solid var(--line); display: grid; grid-template-rows: 1fr auto; align-items: stretch; gap: 8px; padding: 8px; text-align: left; transition: transform .16s ease, background .16s ease, opacity .16s ease; touch-action: pan-y; }
    .playlist-card:active { transform: scale(.985); background: var(--surface-strong); }
    .playlist-card.reorder-source { opacity: .22; transform: scale(.96); }
    .playlist-card.reorder-target { border-color: rgb(var(--accent-rgb) / .72); background: rgb(var(--accent-rgb) / .10); box-shadow: inset 0 0 0 1px rgb(var(--accent-rgb) / .22); }
    .playlist-drag-ghost { position: fixed !important; z-index: 120; pointer-events: none; margin: 0 !important; opacity: .96; transform: scale(1.045); box-shadow: 0 18px 42px rgba(0,0,0,.46); transition: none !important; }
    .playlist-icon { width: 100%; min-height: 0; border-radius: 9px; display: grid; place-items: center; color: var(--accent-text); background: var(--accent); overflow: hidden; }
    .playlist-icon.has-art { background: var(--surface-strong); }
    .playlist-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .playlist-icon svg { width: 30px; height: 30px; }
    .playlist-name { font-size: 14px; font-weight: 780; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .playlist-count { margin-top: 2px; color: var(--muted); font-size: 12px; }
    .playlist-screen { min-height: 0; }
    .playlist-detail-head { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; gap: 10px; margin: 15px 0 8px; }
    .playlist-detail-title { min-width: 0; }
    .playlist-detail-title h2 { margin: 0; font-size: 18px; line-height: 1.2; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist-detail-title span { color: var(--muted); font-size: 12px; }
    .playlist-back { width: 34px; height: 34px; border-radius: 12px; display: grid; place-items: center; background: var(--surface); color: var(--text); border: 1px solid var(--line); }
    .playlist-back svg { width: 18px; height: 18px; }

    .tracks { display: grid; gap: 4px; }
    .track { width: calc(100% - 6px); min-height: 58px; margin-inline: 3px; display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 10px; text-align: left; transition: background .15s ease, transform .15s ease; }
    .track.selecting { grid-template-columns: 28px 44px 1fr auto; }
    .track.selected { background: rgb(var(--accent-rgb) / .14); }
    .track:active { background: var(--surface); transform: scale(.992); }
    .track.playing { background: rgb(var(--accent-rgb) / .14); }
    .track.playing .cover { background: var(--accent); color: var(--accent-text); }
    .track.playing .track-title { color: var(--accent); }
    .cover { position: relative; width: 44px; height: 44px; border-radius: 8px; background: var(--surface-strong); display: grid; place-items: center; color: var(--muted); overflow: hidden; }
    .cover.has-art { background: var(--surface-strong); }
    .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cover svg { width: 22px; height: 22px; }
    .pick { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--muted); display: grid; place-items: center; color: var(--accent-text); }
    .track.selected .pick { border-color: var(--accent); background: var(--accent); }
    .track.selected .pick::after { content: ""; width: 8px; height: 5px; border-left: 2px solid currentColor; border-bottom: 2px solid currentColor; transform: rotate(-45deg) translate(1px, -1px); }
    .track-meta { min-width: 0; }
    .track-title { font-size: 15px; font-weight: 730; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-sub { margin-top: 2px; color: var(--muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .duration { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; padding-left: 8px; }

    .settings { display: grid; overflow: hidden; border-radius: 13px; background: var(--surface); border: 1px solid var(--line); }
    .setting { min-height: 54px; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; padding: 9px 12px; border-bottom: 1px solid var(--line); }
    .setting:last-child { border-bottom: 0; }
    .setting strong { display: block; font-size: 14px; font-weight: 650; }
    .setting small { display: block; margin-top: 1px; color: var(--muted); font-size: 12px; }
    .chevron { color: var(--muted); font-size: 22px; line-height: 1; }
    .switch { width: 44px; height: 26px; border-radius: 999px; background: rgb(var(--text-rgb) / .16); position: relative; transition: background .16s ease; }
    .switch::after { content: ""; position: absolute; left: 2px; top: 2px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: transform .16s ease; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .switch.on { background: var(--accent); }
    .switch.on::after { transform: translateX(18px); }
    .segments { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 5px; max-width: 240px; }
    .seg { height: 30px; min-width: 46px; padding: 0 9px; border-radius: 9px; background: rgb(var(--text-rgb) / .09); color: var(--muted); font-size: 12px; font-weight: 760; }
    .seg.active { background: var(--accent); color: var(--accent-text); }

    .empty { padding: 42px 18px; text-align: center; color: var(--muted); display: grid; justify-items: center; gap: 10px; }
    .empty svg { width: 48px; height: 48px; color: var(--accent); }
    .empty strong { color: var(--text); font-size: 18px; }
    .empty p { margin: 0; max-width: 310px; line-height: 1.45; }

    .player { position: fixed; left: 12px; right: 12px; bottom: calc(12px + var(--player-tabs-offset) + env(safe-area-inset-bottom)); z-index: 20; max-width: 720px; margin: 0 auto; border-radius: 18px; overflow: hidden; background: var(--bg); background: color-mix(in srgb, var(--bg) 94%, var(--text) 6%); border: 1px solid var(--line); box-shadow: 0 14px 34px rgba(0,0,0,.36); transition: transform .22s cubic-bezier(.2,.8,.2,1), opacity .16s ease; }
    body.playlist-reordering .player { transform: translate3d(0, calc(100% + 28px), 0); opacity: 0; pointer-events: none; }
    .bar { position: relative; height: 24px; min-width: 0; background: transparent; display: flex; align-items: center; touch-action: none; cursor: pointer; }
    .bar::before { content: ""; position: absolute; left: 0; right: 0; height: 3px; border-radius: 3px; background: rgb(var(--text-rgb) / .14); }
    .bar span { display: block; width: 0%; height: 100%; background: var(--accent); transition: none; }
    .bar span { position: relative; z-index: 1; height: 3px; border-radius: 3px; }
    .bar span::after { display: none; }
    .player-main { display: grid; grid-template-columns: 70px minmax(0, 1fr); align-items: center; gap: 13px; min-height: 88px; padding: 8px 14px 8px 12px; touch-action: manipulation; }
    .player .cover { position: relative; width: 70px; height: 70px; border-radius: 13px; }
    .mini-cover-play { position: absolute; display: grid; place-items: center; color: rgba(255,255,255,.92); border-radius: 50%; border: 2.5px solid rgba(255,255,255,.82); background: rgba(0,0,0,.18); opacity: .9; box-shadow: 0 1px 1px rgba(0,0,0,.24); transition: all .1s ease; }
    .mini-cover-play.paused { right: 50%; bottom: 50%; width: 40px; height: 40px; margin: 0 -22.5px -22.5px 0; }
    .mini-cover-play.playing { right: 4px; bottom: 4px; width: 16px; height: 16px; margin: 0; border-width: 2px; }
    .mini-cover-play.paused svg { width: 20px; height: 20px; }
    .mini-cover-play.playing svg { width: 12px; height: 12px; }
    .mini-cover-play svg { display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,.35)); }
    .player-title { font-size: 17px; line-height: 1.16; font-weight: 820; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0; }
    .player-sub { display: none; }
    .player-progress-row { display: grid; grid-template-columns: minmax(70px, 1fr) auto; align-items: center; gap: 10px; margin-top: 3px; }
    .player-time { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .controls { display: none; align-items: center; gap: 7px; }
    .ctrl { width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; color: var(--muted); background: rgb(var(--text-rgb) / .07); }
    .ctrl.primary { width: 46px; height: 46px; background: var(--accent); color: var(--accent-text); }

    .full-player { display: none !important; }
    body.big-player-open .app { overflow: hidden; }
    html.sheet-launch .app, html.sheet-launch #player,
    body.sheet-launch .app, body.sheet-launch #player { display: none !important; }
    .big-player-modal { position: fixed; inset: 0; z-index: 60; display: none; overflow: hidden; background: rgba(0,0,0,.68); }
    .big-player-modal.open { display: block; animation: fade .16s ease both; }
    .big-player-modal.closing { animation: fadeOut .18s ease both; pointer-events: none; }
    .big-player-panel { --drag-y: 0px; position: absolute; left: 0; right: 0; bottom: 0; max-width: 720px; height: min(96vh, 850px); height: min(96dvh, 850px); margin: 0 auto; display: grid; grid-template-rows: auto auto minmax(260px, 44vh); overflow: hidden; border-radius: 22px 22px 0 0; background: var(--bg); box-shadow: 0 -18px 42px rgba(0,0,0,.42); transform: translateY(var(--drag-y)); transition: transform .2s cubic-bezier(.2,.8,.2,1); animation: sheetUp .2s cubic-bezier(.2,.8,.2,1) both; will-change: transform; }
    .big-player-modal.closing .big-player-panel { transform: translateY(100%); }
    .big-player-panel.dragging { transition: none; }
    .big-drag-zone { min-height: 42px; display: grid; grid-template-columns: 1fr; align-items: center; padding: calc(8px + env(safe-area-inset-top)) 12px 2px; touch-action: none; }
    .big-drag-handle { justify-self: center; width: 42px; height: 5px; border-radius: 999px; background: rgb(var(--text-rgb) / .20); }
    .big-player-close { display: none; }
    .big-player-close svg { width: 22px; height: 22px; }
    .big-now { min-height: 0; display: grid; grid-template-rows: auto auto auto auto; gap: 14px; align-items: center; padding: 0 22px 14px; }
    .big-cover { width: min(54vw, 232px); max-width: 24vh; max-height: 24vh; aspect-ratio: 1 / 1; justify-self: center; display: grid; place-items: center; overflow: hidden; border-radius: 16px; background: var(--surface-strong); color: var(--muted); box-shadow: 0 10px 28px rgba(0,0,0,.24); touch-action: none; margin-bottom: 10px; }
    .big-cover img { width: 100%; height: 100%; object-fit: cover; }
    .big-cover svg { width: 72px; height: 72px; }
    .big-meta { min-width: 0; text-align: center; margin-top: 2px; padding-top: 14px; }
    .big-title { font-size: 21px; line-height: 1.22; font-weight: 850; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .big-artist { margin-top: 4px; color: var(--muted); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .big-progress { width: 100%; display: grid; gap: 7px; }
    .big-seek { position: relative; height: 22px; display: flex; align-items: center; cursor: pointer; touch-action: none; }
    .big-seek::before { content: ""; position: absolute; left: 0; right: 0; height: 4px; border-radius: 4px; background: rgb(var(--text-rgb) / .14); }
    .big-seek span { position: relative; z-index: 1; display: block; width: 0; height: 4px; border-radius: 4px; background: var(--accent); }
    .big-times { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    .big-controls { width: min(100%, 348px); justify-self: center; display: grid; grid-template-columns: 44px 54px 76px 54px 44px; gap: 4px; justify-content: center; align-items: center; padding: 7px; border-radius: 28px; background: rgb(var(--text-rgb) / .075); border: 1px solid var(--line); box-shadow: inset 0 1px 0 rgb(var(--text-rgb) / .05), 0 10px 24px rgba(0,0,0,.18); }
    .big-ctrl { width: 54px; height: 48px; border-radius: 17px; display: grid; place-items: center; color: var(--text); background: transparent; border: 0; box-shadow: none; transition: transform .14s ease, background .14s ease, color .14s ease; }
    .big-ctrl svg { width: 23px; height: 23px; }
    .big-ctrl:active { transform: scale(.92); background: rgb(var(--text-rgb) / .11); }
    .big-ctrl.primary { width: 76px; height: 56px; border-radius: 23px; color: var(--accent-text); background: var(--accent); box-shadow: 0 8px 18px rgb(var(--accent-rgb) / .24); }
    .big-ctrl.primary svg { width: 28px; height: 28px; }
    .big-ctrl.small { width: 44px; height: 44px; border-radius: 15px; color: var(--muted); background: transparent; }
    .big-ctrl.small svg { width: 20px; height: 20px; }
    .big-ctrl.on { color: var(--accent-text); background: rgb(var(--accent-rgb) / .88); }
    .big-queue-wrap { min-height: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); background: rgb(var(--text-rgb) / .045); border-radius: 22px 22px 0 0; }
    .big-queue-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 18px 6px; }
    .big-queue-head strong { font-size: 16px; }
    .big-queue-head span { color: var(--muted); font-size: 12px; }
    .big-queue { min-height: 0; overflow: auto; padding: 0 12px calc(16px + env(safe-area-inset-bottom)); overscroll-behavior: contain; -webkit-overflow-scrolling: touch; scrollbar-width: none; touch-action: pan-y; }
    .big-queue-row { width: 100%; min-height: 52px; display: grid; grid-template-columns: 38px 1fr auto; align-items: center; gap: 10px; padding: 5px 6px; border-radius: 12px; text-align: left; }
    .big-queue-row.playing { background: rgb(var(--accent-rgb) / .13); }
    .big-queue-row.playing .track-title { color: var(--accent); }
    .big-queue-row .cover { width: 38px; height: 38px; border-radius: 9px; }
    .big-queue-row .duration { padding-left: 4px; }

    .full-player { position: fixed; inset: 0; z-index: 40; display: none; background: var(--bg); padding: calc(34px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom)); }
    .full-player.open { display: grid; grid-template-rows: auto 1fr auto; animation: fade .16s ease both; }
    .full-top { display: grid; grid-template-columns: 44px 1fr 44px; align-items: center; min-height: 44px; }
    .full-title { text-align: center; font-size: 13px; color: var(--muted); font-weight: 760; }
    .icon-btn { width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; background: var(--surface); }
    .full-main { display: grid; align-content: center; gap: 22px; min-height: 0; }
    .full-cover { width: min(74vw, 390px); aspect-ratio: 1 / 1; border-radius: 18px; justify-self: center; display: grid; place-items: center; overflow: hidden; background: var(--surface-strong); color: var(--muted); box-shadow: 0 20px 58px rgba(0,0,0,.38); }
    .full-cover img { width: 100%; height: 100%; object-fit: cover; }
    .full-cover svg { width: 64px; height: 64px; }
    .full-meta { min-width: 0; }
    .full-song { font-size: 23px; line-height: 1.18; font-weight: 840; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .full-artist { margin-top: 5px; color: var(--muted); font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .full-progress { display: grid; gap: 7px; }
    .seek { position: relative; height: 18px; display: flex; align-items: center; }
    .seek::before { content: ""; position: absolute; left: 0; right: 0; height: 4px; border-radius: 4px; background: rgb(var(--text-rgb) / .16); }
    .seek span { position: relative; z-index: 1; display: block; width: 0; height: 4px; border-radius: 4px; background: var(--accent); }
    .times { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    .full-controls { display: grid; grid-template-columns: 46px 58px 72px 58px 46px; align-items: center; justify-content: center; gap: 10px; }
    .full-ctrl { width: 58px; height: 58px; border-radius: 50%; display: grid; place-items: center; background: var(--surface); color: var(--text); }
    .full-ctrl.primary { width: 72px; height: 72px; background: var(--accent); color: var(--accent-text); }
    .full-ctrl.small { width: 46px; height: 46px; color: var(--muted); }
    .full-ctrl.on { color: var(--accent); background: rgb(var(--accent-rgb) / .14); }

    .selection-bar { position: fixed; left: 12px; right: 12px; bottom: calc(12px + var(--player-tabs-offset) + env(safe-area-inset-bottom)); z-index: 22; max-width: 720px; margin: 0 auto; min-height: 58px; border-radius: 16px; background: rgba(28, 28, 30, .96); border: 1px solid var(--line); box-shadow: 0 14px 36px rgba(0,0,0,.32); display: none; grid-template-columns: minmax(0, 1fr) auto auto auto; align-items: center; gap: 6px; padding: 9px 10px; }
    .selection-bar.open { display: grid; }
    .selection-title { font-size: 14px; font-weight: 800; }
    .selection-sub { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .selection-btn { height: 38px; padding: 0 12px; border-radius: 12px; background: var(--accent); color: var(--accent-text); font-size: 13px; font-weight: 780; white-space: nowrap; }
    .selection-btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--line); }
    .selection-btn.danger { background: rgb(var(--accent-rgb) / .14); color: var(--accent); border: 1px solid rgb(var(--accent-rgb) / .24); }

    .overlay { position: fixed; inset: 0; z-index: 30; display: none; background: rgba(0,0,0,.45); }
    .overlay.open { display: block; animation: fade .14s ease both; }
    .sheet { position: fixed; left: 12px; right: 12px; bottom: calc(100px + env(safe-area-inset-bottom)); max-width: 720px; margin: 0 auto; border-radius: 18px; background: var(--bg); border: 1px solid var(--line); box-shadow: 0 18px 42px rgba(0,0,0,.38); padding: 12px; }
    .sheet h3 { margin: 0 0 10px; font-size: 17px; }
    .sheet-input { width: 100%; height: 44px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); color: var(--text); outline: 0; padding: 0 12px; }
    .sheet-list { display: grid; gap: 4px; max-height: 260px; overflow: auto; }
    .sheet-row { min-height: 46px; border-radius: 12px; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; padding: 0 10px; background: var(--surface); text-align: left; }
    .sheet-row small { color: var(--muted); font-size: 12px; }
    .sheet-row.active { color: var(--accent); }
    .sheet-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .sheet-btn { height: 42px; border-radius: 12px; font-weight: 780; background: var(--accent); color: var(--accent-text); }
    .sheet-btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--line); }
    .sheet-btn.danger { background: rgba(255, 92, 122, .16); color: var(--danger); border: 1px solid rgba(255, 92, 122, .26); }

    @media (min-width: 650px) {
      .app { padding-left: 20px; padding-right: 20px; }
      .playlist-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (orientation: landscape) and (max-height: 520px) {
      .app { padding-bottom: calc(112px + var(--player-tabs-offset) + env(safe-area-inset-bottom)); }
      .topbar { padding-top: calc(8px + env(safe-area-inset-top)); }
      .big-player-panel { width: 100%; max-width: none; height: 100vh; height: 100dvh; grid-template-columns: minmax(300px, 45%) minmax(0, 1fr); grid-template-rows: 30px minmax(0, 1fr); border-radius: 0; }
      .big-drag-zone { grid-column: 1 / -1; grid-row: 1; min-height: 30px; padding: 5px 12px 2px; }
      .big-now { grid-column: 1; grid-row: 2; min-width: 0; grid-template-rows: minmax(74px, 1fr) auto auto auto; gap: 5px; padding: 0 14px 8px; }
      .big-cover { width: min(24vh, 108px); max-width: 24vh; max-height: 24vh; margin: 0; border-radius: 13px; }
      .big-cover svg { width: 46px; height: 46px; }
      .big-meta { margin: 0; padding-top: 0; }
      .big-title { font-size: 18px; }
      .big-artist { margin-top: 2px; font-size: 13px; }
      .big-progress { gap: 2px; }
      .big-controls { transform: scale(.88); transform-origin: center; margin: -4px 0; }
      .big-queue-wrap { grid-column: 2; grid-row: 2; border-radius: 18px 0 0 0; }
      .big-queue { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
    }
    @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
    @keyframes fadeOut { from { opacity: 1 } to { opacity: 0 } }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(var(--drag-y)); } }
    @keyframes viewEnterNext { from { opacity: 1; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    @keyframes viewExitNext { from { opacity: 1; transform: translateX(0); } to { opacity: 1; transform: translateX(-100%); } }
    @keyframes viewEnterPrev { from { opacity: 1; transform: translateX(-100%); } to { opacity: 1; transform: translateX(0); } }
    @keyframes viewExitPrev { from { opacity: 1; transform: translateX(0); } to { opacity: 1; transform: translateX(100%); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <label class="search">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="m21 21-4.35-4.35M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="search" placeholder="Поиск">
      </label>

      <nav class="tabs">
        <button class="tab active" data-view="library">Библиотека</button>
        <button class="tab" data-view="playlists">Плейлисты</button>
        <span class="tabs-indicator" id="tabsIndicator"></span>
      </nav>
    </div>

    <main id="root" class="view-root"></main>
  </div>

  <section class="player" id="player" hidden>
    <div class="player-main">
      <div class="cover" id="playerCover"></div>
      <div class="track-meta">
        <div class="player-title" id="playerTitle">Не играет</div>
        <div class="player-sub" id="playerSub">Выбери трек</div>
        <div class="player-progress-row">
          <div class="bar" role="slider" aria-label="Позиция трека" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><span id="progress"></span></div>
          <div class="player-time" id="playerTime">0:00 / 0:00</div>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl" id="prev" aria-label="Назад"></button>
        <button class="ctrl primary" id="toggle" aria-label="Играть"></button>
        <button class="ctrl" id="next" aria-label="Вперед"></button>
      </div>
    </div>
  </section>

  <section class="selection-bar" id="selectionBar">
    <div>
      <div class="selection-title" id="selectionTitle">0 выбрано</div>
      <div class="selection-sub">Добавить в плейлист</div>
    </div>
    <button class="selection-btn" id="bulkAdd">В плейлист</button>
    <button class="selection-btn danger" id="bulkDelete">Удалить</button>
    <button class="selection-btn secondary" id="selectionCancel">Отмена</button>
  </section>

  <div class="overlay" id="overlay">
    <section class="sheet" id="sheet"></section>
  </div>
  <section class="big-player-modal" id="bigPlayerModal">
    <div class="big-player-panel" id="bigPlayerPanel">
      <div class="big-drag-zone" id="bigDragZone">
        <div class="big-drag-handle"></div>
        <button class="big-player-close" id="bigPlayerClose" aria-label="Закрыть">
          <svg viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="big-now">
        <div class="big-cover" id="bigCover"></div>
        <div class="big-meta">
          <div class="big-title" id="bigTitle">Не играет</div>
          <div class="big-artist" id="bigArtist">Loli музыка</div>
        </div>
        <div class="big-progress">
          <div class="big-seek" id="bigSeek"><span id="bigProgress"></span></div>
          <div class="big-times"><span id="bigElapsed">0:00</span><span id="bigRemaining">0:00</span></div>
        </div>
        <div class="big-controls">
          <button class="big-ctrl small" id="bigShuffle" aria-label="Перемешать"></button>
          <button class="big-ctrl" id="bigPrev" aria-label="Назад"></button>
          <button class="big-ctrl primary" id="bigToggle" aria-label="Играть"></button>
          <button class="big-ctrl" id="bigNext" aria-label="Вперед"></button>
          <button class="big-ctrl small" id="bigRepeat" aria-label="Повтор"></button>
        </div>
      </div>
      <div class="big-queue-wrap">
        <div class="big-queue-head">
          <strong id="bigQueueTitle">Библиотека</strong>
          <span id="bigQueueCount">0 треков</span>
        </div>
        <div class="big-queue" id="bigQueue"></div>
      </div>

  <section class="full-player" id="fullPlayer">
    <div class="full-top">
      <button class="icon-btn" id="fullClose" aria-label="Закрыть">⌄</button>
      <div class="full-title">Сейчас играет</div>
      <button class="icon-btn" id="fullMore" aria-label="Плейлист">＋</button>
    </div>
    <div class="full-main">
      <div class="full-cover" id="fullCover"></div>
      <div class="full-meta">
        <div class="full-song" id="fullTitle">Не играет</div>
        <div class="full-artist" id="fullArtist">Loli музыка</div>
      </div>
      <div class="full-progress">
        <div class="seek" id="fullSeek"><span id="fullProgress"></span></div>
        <div class="times"><span id="elapsed">0:00</span><span id="remaining">0:00</span></div>
      </div>
    </div>
    <div class="full-controls">
      <button class="full-ctrl small" id="fullShuffle" aria-label="Перемешать">⇄</button>
      <button class="full-ctrl" id="fullPrev" aria-label="Назад"></button>
      <button class="full-ctrl primary" id="fullToggle" aria-label="Играть"></button>
      <button class="full-ctrl" id="fullNext" aria-label="Вперед"></button>
      <button class="full-ctrl small" id="fullRepeat" aria-label="Повтор">↻</button>
    </div>
  </section>

  <script>
    const icon = {
      music: '<svg viewBox="0 0 24 24" fill="none"><path d="M9 18V6l10-2v12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="18" r="3" fill="currentColor"/><circle cx="17" cy="16" r="3" fill="currentColor"/></svg>',
      play: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M8 5v14l11-7L8 5Z" fill="currentColor"/></svg>',
      pause: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M7 5h4v14H7V5Zm6 0h4v14h-4V5Z" fill="currentColor"/></svg>',
      next: '<svg width="17" height="17" viewBox="0 0 24 24"><path d="m13 6 6 6-6 6V6ZM5 6l6 6-6 6V6Z" fill="currentColor"/></svg>',
      prev: '<svg width="17" height="17" viewBox="0 0 24 24"><path d="m11 18-6-6 6-6v12Zm8 0-6-6 6-6v12Z" fill="currentColor"/></svg>',
      shuffle: '<svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M4 7h3c2.7 0 4.1 2 5.5 4.5S15.3 16 18 16h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18 13l3 3-3 3M4 17h3c1.2 0 2.2-.4 3-1.2M14 8.2A4.8 4.8 0 0 1 18 7h2M18 4l3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      repeat: '<svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M17 2l4 4-4 4M3 11V9a3 3 0 0 1 3-3h15M7 22l-4-4 4-4M21 13v2a3 3 0 0 1-3 3H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      repeatOne: '<svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M17 2l4 4-4 4M3 11V9a3 3 0 0 1 3-3h15M7 22l-4-4 4-4M21 13v2a3 3 0 0 1-3 3H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
      check: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m5 13 4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      list: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>',
      back: '<svg viewBox="0 0 24 24" fill="none"><path d="m15 6-6 6 6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    };
    const bigIcon = {
      play: '<svg viewBox="0 0 24 24" fill="none"><path d="M9 6.9v10.2c0 .9 1 1.45 1.77.96l7.92-5.1a1.15 1.15 0 0 0 0-1.92l-7.92-5.1A1.15 1.15 0 0 0 9 6.9Z" fill="currentColor"/></svg>',
      pause: '<svg viewBox="0 0 24 24" fill="none"><rect x="7" y="5.5" width="3.8" height="13" rx="1.9" fill="currentColor"/><rect x="13.2" y="5.5" width="3.8" height="13" rx="1.9" fill="currentColor"/></svg>',
      next: '<svg viewBox="0 0 24 24" fill="none"><path d="m7.5 6.2 5.8 5.8-5.8 5.8M13.4 6.2l5.8 5.8-5.8 5.8" stroke="currentColor" stroke-width="2.45" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      prev: '<svg viewBox="0 0 24 24" fill="none"><path d="M16.5 6.2 10.7 12l5.8 5.8M10.6 6.2 4.8 12l5.8 5.8" stroke="currentColor" stroke-width="2.45" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    };

    const root = document.getElementById('root');
    const app = document.querySelector('.app');
    const topbar = document.querySelector('.topbar');
    const tabsIndicator = document.getElementById('tabsIndicator');
    const overlay = document.getElementById('overlay');
    const sheet = document.getElementById('sheet');
    const urlParams = new URLSearchParams(location.search);
    const viewOrder = ['library', 'playlists'];
    const state = {
      view: 'library',
      q: '',
      tracks: [],
      librarySignature: '',
      embeddedSheet: urlParams.get('sheet') === '1',
      autoOpenBig: urlParams.get('big') === '1',
      native: {},
      playingIndex: -1,
      selectedPlaylist: '',
      playlistViewId: '',
      playlists: loadPlaylists(),
      tags: loadJson('loliTags', {}),
      editingPlaylist: null,
      selecting: false,
      bigIndex: 0,
      localShuffle: false,
      localRepeat: 0,
      activeQueueKeys: [],
      selected: new Set()
    };
    if (state.autoOpenBig) {
      document.documentElement.classList.add('sheet-launch');
      document.body.classList.add('sheet-launch');
    }
    let bigQueueSignature = '';
    let bigRenderedTrackKey = '';
    let viewAnimationTimer = 0;
    let suppressNextViewAnimation = false;
    let bigCloseTimer = 0;
    let bigCloseToken = 0;
    let miniCoverKey = '';
    let miniSeekDragging = false;
    let pendingMiniSeekProgress = 0;
    let nativeStateAt = performance.now();
    let stateLoading = false;
    let libraryLoading = false;
    let pollingPaused = false;
    let statePollTimer = 0;
    let libraryPollTimer = 0;
    let playbackTimer = 0;
    let playlistDragActive = false;
    let suppressPlaylistClickUntil = 0;
    let playlistReorderOwner = null;

    function cancelPlaylistReorderGesture(cancelled = true) {
      const owner = playlistReorderOwner;
      if (owner?.cancel) owner.cancel(cancelled);
      if (playlistReorderOwner === owner) playlistReorderOwner = null;
      document.querySelectorAll('.playlist-drag-ghost').forEach(node => node.remove());
      document.querySelectorAll('.playlist-card.reorder-source, .playlist-card.reorder-target').forEach(node => node.classList.remove('reorder-source', 'reorder-target'));
      document.body.classList.remove('playlist-reordering');
      playlistDragActive = false;
    }

    function loadJson(key, fallback) {
      try { return JSON.parse(localStorage[key] || ''); } catch (e) { return fallback; }
    }
    function saveJson(key, value) { localStorage[key] = JSON.stringify(value); }
    function loadPlaylists() {
      const saved = loadJson('loliPlaylists2', null);
      if (Array.isArray(saved) && saved.length) return saved;
      return [
        { id: 'fav', name: 'Избранное' },
        { id: 'night', name: 'Ночь' },
        { id: 'drive', name: 'Драйв' }
      ];
    }
    function savePlaylists() { saveJson('loliPlaylists2', state.playlists); }
    function saveTags() { saveJson('loliTags', state.tags); }
    function call(name, ...args) { try { if (window.LoliMusic) LoliMusic[name](...args); } catch (e) {} }
    function haptic() { call('haptic'); }
    function colorRgbParts(color) {
      const value = String(color || '').replace('#', '');
      if (!/^[0-9a-f]{6}$/i.test(value)) return '255 59 120';
      return `${parseInt(value.slice(0, 2), 16)} ${parseInt(value.slice(2, 4), 16)} ${parseInt(value.slice(4, 6), 16)}`;
    }
    window.loliMusicApplyTheme = (bg, text, muted, accent, accentText) => {
      const style = document.documentElement.style;
      style.setProperty('--bg', bg);
      style.setProperty('--text', text);
      style.setProperty('--text-rgb', colorRgbParts(text));
      style.setProperty('--muted', muted);
      style.setProperty('--accent', accent);
      style.setProperty('--accent-text', accentText);
      style.setProperty('--accent-rgb', colorRgbParts(accent));
    };
    window.setMainTabsVisibility = factor => {
      const visible = Math.max(0, Math.min(1, Number(factor) || 0));
      const style = document.documentElement.style;
      style.setProperty('--player-tabs-offset', `${84 * visible}px`);
    };
    function fmt(sec) {
      if (!sec || sec < 0) return '--:--';
      return Math.floor(sec / 60) + ':' + String(Math.floor(sec % 60)).padStart(2, '0');
    }
    function trackPlaylists(key) { return state.tags[key] || []; }
    function playlistCount(id) { return state.tracks.filter(t => trackPlaylists(t.key).includes(id)).length; }
    function playlistTracks(id) { return state.tracks.filter(t => trackPlaylists(t.key).includes(id)); }
    function activeQueueTracks() {
      if (!state.activeQueueKeys.length) return state.tracks;
      const allowed = new Set(state.activeQueueKeys);
      return state.tracks.filter(track => allowed.has(track.key));
    }
    function activeQueueTitle() {
      const queue = activeQueueTracks();
      const queueKeys = new Set(queue.map(track => track.key));
      const playlist = state.playlists.find(item => {
        const tracks = playlistTracks(item.id);
        return tracks.length === queue.length && tracks.every(track => queueKeys.has(track.key));
      });
      return playlist?.name || 'Библиотека';
    }
    function queueIndexForTrack(track, queue) {
      return Math.max(0, queue.findIndex(item => item.key === track.key));
    }
    function playlistName(id) { return state.playlists.find(p => p.id === id)?.name || 'Плейлист'; }
    function artHtml(track, fallback, large = false) {
      const source = track && (large ? (track.art || track.thumb) : track.thumb);
      return source ? `<img src="${source}" alt="">` : fallback;
    }
    function playlistArtTrack(id) {
      return state.tracks.find(t => trackPlaylists(t.key).includes(id) && t.thumb);
    }
    function selectedCount() { return state.selected.size; }
    function setPlayingIndex(index) {
      state.playingIndex = index;
      state.native.playingIndex = index;
    }
    function updatePlayingRows() {
      const index = currentIndex();
      document.querySelectorAll('.track').forEach(row => {
        const playing = index >= 0 && Number(row.dataset.index) === index;
        row.classList.toggle('playing', playing);
      });
      updateBigQueueActive(index);
    }
    function syncPlaybackUi() {
      updatePlayingRows();
      updatePlayer();
      updateSelectionBar();
      syncPlaybackLoop();
    }
    function playbackSnapshot() {
      const current = currentTrack();
      const duration = Math.max(0, Number(state.native.duration || current?.duration || 0));
      const playing = Number(state.native.playingIndex) >= 0 && state.native.paused === false;
      let progress = Math.max(0, Math.min(1, Number(state.native.progress || 0)));
      let elapsed = Math.max(0, Number(state.native.progressSec || Math.round(duration * progress) || 0));
      if (playing && duration > 0) {
        const delta = Math.max(0, (performance.now() - nativeStateAt) / 1000);
        elapsed = Math.min(duration, elapsed + delta);
        progress = Math.min(1, elapsed / duration);
      }
      return { progress, elapsed, duration };
    }
    function updatePlaybackProgressOnly() {
      if (!state.tracks.length) return;
      const playback = playbackSnapshot();
      document.getElementById('progress').style.width = `${playback.progress * 100}%`;
      document.querySelector('.bar').setAttribute('aria-valuenow', String(Math.round(playback.progress * 100)));
      document.getElementById('playerTime').textContent = `${playback.duration ? fmt(playback.elapsed) : '0:00'} / ${playback.duration ? fmt(playback.duration) : '0:00'}`;
      if (document.getElementById('bigPlayerModal').classList.contains('open') && !bigSeekDragging) {
        document.getElementById('bigProgress').style.width = `${playback.progress * 100}%`;
        document.getElementById('bigElapsed').textContent = playback.elapsed ? fmt(playback.elapsed) : '0:00';
        document.getElementById('bigRemaining').textContent = playback.duration ? '-' + fmt(Math.max(0, playback.duration - playback.elapsed)) : '--:--';
      }
      if (document.getElementById('fullPlayer').classList.contains('open')) {
        document.getElementById('fullProgress').style.width = `${playback.progress * 100}%`;
        document.getElementById('elapsed').textContent = playback.elapsed ? fmt(playback.elapsed) : '0:00';
        document.getElementById('remaining').textContent = playback.duration ? '-' + fmt(Math.max(0, playback.duration - playback.elapsed)) : '--:--';
      }
    }
    function setLocalSeekProgress(progress) {
      const current = currentTrack();
      const duration = Math.max(0, Number(state.native.duration || current?.duration || 0));
      const nextProgress = Math.max(0, Math.min(1, Number(progress) || 0));
      state.native.progress = nextProgress;
      state.native.progressSec = Math.round(duration * nextProgress);
      nativeStateAt = performance.now();
      updatePlaybackProgressOnly();
    }
    function miniSeekProgressFromClientX(clientX) {
      const bar = document.querySelector('.bar');
      const r = bar.getBoundingClientRect();
      return Math.max(0, Math.min(1, (clientX - r.left) / Math.max(1, r.width)));
    }
    function previewMiniSeek(progress) {
      pendingMiniSeekProgress = Math.max(0, Math.min(1, Number(progress) || 0));
      const current = currentTrack();
      const duration = Math.max(0, Number(state.native.duration || current?.duration || 0));
      document.getElementById('progress').style.width = `${pendingMiniSeekProgress * 100}%`;
      document.querySelector('.bar').setAttribute('aria-valuenow', String(Math.round(pendingMiniSeekProgress * 100)));
      document.getElementById('playerTime').textContent = `${duration ? fmt(duration * pendingMiniSeekProgress) : '0:00'} / ${duration ? fmt(duration) : '0:00'}`;
    }
    function finishMiniSeek(clientX) {
      if (!miniSeekDragging) return;
      miniSeekDragging = false;
      document.querySelector('.bar').classList.remove('dragging');
      call('setHorizontalSwipeLocked', false);
      const progress = typeof clientX === 'number' ? miniSeekProgressFromClientX(clientX) : pendingMiniSeekProgress;
      previewMiniSeek(progress);
      setLocalSeekProgress(progress);
      call('seek', progress);
      haptic();
      setTimeout(loadState, 160);
    }
    function clearViewAnimation() {
      if (viewAnimationTimer) {
        clearTimeout(viewAnimationTimer);
        viewAnimationTimer = 0;
      }
      document.querySelectorAll('.view-ghost').forEach(node => node.remove());
      document.querySelectorAll('.view-swipe-page').forEach(node => node.remove());
      if (typeof root.getAnimations === 'function') root.getAnimations().forEach(animation => animation.cancel());
      root.style.transition = '';
      root.style.transform = '';
      root.style.opacity = '';
      root.classList.remove('view-enter-next', 'view-enter-prev');
    }
    function setTabIndicatorPosition(position, dragging) {
      const clamped = Math.max(0, Math.min(1, Number(position) || 0));
      const wasDragging = tabsIndicator.classList.contains('dragging');
      tabsIndicator.classList.toggle('dragging', !!dragging);
      if (wasDragging && !dragging) void tabsIndicator.offsetWidth;
      tabsIndicator.style.left = `${9 + clamped * 50}%`;
      document.querySelectorAll('.tab').forEach((tab, index) => {
        const selection = Math.max(0, 1 - Math.abs(clamped - index));
        tab.style.color = `color-mix(in srgb, var(--accent) ${Math.round(selection * 100)}%, var(--muted))`;
      });
    }

    };
    const bigSeek = document.getElementById('bigSeek');
    let bigSeekDragging = false;
    let pendingBigSeekProgress = 0;
    function bigSeekProgressFromClientX(clientX) {
      const r = bigSeek.getBoundingClientRect();
      return Math.max(0, Math.min(1, (clientX - r.left) / Math.max(1, r.width)));
    }
    function previewBigSeek(progress) {
      const current = currentTrack();
      const duration = state.native.duration || current.duration || 0;
      const elapsed = Math.round(duration * progress);
      document.getElementById('bigProgress').style.width = `${Math.round(progress * 100)}%`;
      document.getElementById('bigElapsed').textContent = elapsed ? fmt(elapsed) : '0:00';
      document.getElementById('bigRemaining').textContent = duration ? '-' + fmt(Math.max(0, duration - elapsed)) : '--:--';
    }
    function applyBigSeek(progress, commitNative) {
      pendingBigSeekProgress = progress;
      previewBigSeek(progress);
      if (!commitNative) return;
      setLocalSeekProgress(progress);
      call('seek', progress);
      setTimeout(loadState, 160);
    }
    bigSeek.addEventListener('pointerdown', e => {
      bigSeekDragging = true;
      bigSeek.classList.add('dragging');
      try { bigSeek.setPointerCapture(e.pointerId); } catch (ignore) {}
      applyBigSeek(bigSeekProgressFromClientX(e.clientX), false);
      haptic();
      e.preventDefault();
    });
    bigSeek.addEventListener('pointermove', e => {
      if (!bigSeekDragging) return;
      applyBigSeek(bigSeekProgressFromClientX(e.clientX), false);
      e.preventDefault();
    });
    function finishBigSeek(clientX) {
      if (!bigSeekDragging) return;
      bigSeekDragging = false;
      bigSeek.classList.remove('dragging');
      applyBigSeek(typeof clientX === 'number' ? bigSeekProgressFromClientX(clientX) : pendingBigSeekProgress, true);
      renderBigPlayer();
    }
    bigSeek.addEventListener('pointerup', e => finishBigSeek(e.clientX));
    bigSeek.addEventListener('pointercancel', () => finishBigSeek());
    const bigPanel = document.getElementById('bigPlayerPanel');
    const bigDragTargets = [
      document.getElementById('bigDragZone'),
      document.getElementById('bigCover'),
      document.querySelector('.big-meta')
    ].filter(Boolean);
    let bigDragStartY = 0, bigDragStartTime = 0;
    let bigDragging = false;
    function resistedDragY(rawDy) {
      const dy = Math.max(0, rawDy);
      return dy <= 160 ? dy : 160 + (dy - 160) * .18;
    }
    function finishBigDrag(clientY) {
      if (!bigDragging) return;
      const dy = Math.max(0, clientY - bigDragStartY);
      const elapsedMs = Math.max(1, Date.now() - bigDragStartTime);
      const velocity = dy / elapsedMs;
      bigDragging = false;
      bigPanel.classList.remove('dragging');
      if (dy > 72 || velocity > 0.75) {
        bigPanel.style.setProperty('--drag-y', `${Math.max(resistedDragY(dy), 96)}px`);
        closeBigPlayer(true);
      } else {
        resetBigDrag();
      }
    }
    bigDragTargets.forEach(target => {
      target.addEventListener('pointerdown', e => {
        if (e.target.closest('button, .big-seek, .big-queue')) return;
        bigDragging = true;
        bigDragStartY = e.clientY;
        bigDragStartTime = Date.now();
        bigPanel.classList.add('dragging');
        try { target.setPointerCapture(e.pointerId); } catch (ignore) {}
      });
      target.addEventListener('pointermove', e => {
        if (!bigDragging) return;
        bigPanel.style.setProperty('--drag-y', `${resistedDragY(e.clientY - bigDragStartY)}px`);
        e.preventDefault();
      });
      target.addEventListener('pointerup', e => finishBigDrag(e.clientY));
      target.addEventListener('pointercancel', e => finishBigDrag(e.clientY));
    });
    call('setMusicView', state.view);
    document.getElementById('fullClose').onclick = () => { document.getElementById('fullPlayer').classList.remove('open'); haptic(); };
    document.getElementById('fullToggle').onclick = () => { haptic(); call('togglePlayPause'); setTimeout(loadState, 160); };
    document.getElementById('fullNext').onclick = () => { haptic(); call('next'); setTimeout(loadState, 200); };
    document.getElementById('fullPrev').onclick = () => { haptic(); call('previous'); setTimeout(loadState, 200); };
    document.getElementById('fullShuffle').onclick = () => { state.native.shuffle = !state.native.shuffle; haptic(); call('shuffle', state.native.shuffle); updatePlayer(); setTimeout(loadState, 180); };
    function nextRepeatMode(mode) { return mode === 0 ? 1 : mode === 1 ? 2 : 0; }
    document.getElementById('fullRepeat').onclick = () => { state.native.repeat = nextRepeatMode(Number(state.native.repeat || 0)); haptic(); call('repeat', state.native.repeat); updatePlayer(); setTimeout(loadState, 180); };
    document.getElementById('fullMore').onclick = () => {
      const track = currentTrack();
      if (track) {
        document.getElementById('fullPlayer').classList.remove('open');
        openTrackPlaylists(track);
      }
    };
    document.getElementById('fullSeek').onclick = e => {
      const r = e.currentTarget.getBoundingClientRect();
      const progress = (e.clientX - r.left) / r.width;
      setLocalSeekProgress(progress);
      call('seek', progress);
      haptic();
      setTimeout(loadState, 160);
    };

    function stopPlaybackLoop() {
      if (playbackTimer) clearTimeout(playbackTimer);
      playbackTimer = 0;
    }
    function ensurePlaybackLoop() {
      if (playbackTimer || pollingPaused || document.hidden || state.native.paused !== false || !state.tracks.length) return;
      const tick = () => {
        playbackTimer = 0;
        if (pollingPaused || document.hidden || state.native.paused !== false || !state.tracks.length) return;
        if (!miniSeekDragging) updatePlaybackProgressOnly();
        playbackTimer = setTimeout(tick, 100);
      };
      playbackTimer = setTimeout(tick, 100);
    }
    function syncPlaybackLoop() {
      if (state.native.paused === false && state.tracks.length) ensurePlaybackLoop();
      else stopPlaybackLoop();
    }
    function statePollDelay() {
      return state.native.paused === false ? 2000 : 5000;
    }
    function startPolling() {
      clearTimeout(statePollTimer);
      clearTimeout(libraryPollTimer);
      if (pollingPaused || document.hidden) return;
      statePollTimer = setTimeout(async function pollState() {
        await loadState();
        if (!pollingPaused && !document.hidden) statePollTimer = setTimeout(pollState, statePollDelay());
      }, statePollDelay());
      libraryPollTimer = setTimeout(async function pollLibrary() {
        await loadLibrary(true);
        if (!pollingPaused && !document.hidden) libraryPollTimer = setTimeout(pollLibrary, 30000);
      }, 30000);
      syncPlaybackLoop();
    }
    window.loliMusicPause = () => {
      cancelPlaylistReorderGesture(true);
      cancelViewSwipeImmediately();
      pollingPaused = true;
      clearTimeout(statePollTimer);
      clearTimeout(libraryPollTimer);
      stopPlaybackLoop();
      if (miniSeekDragging) finishMiniSeek();
    };
    window.loliMusicResume = () => {
      pollingPaused = false;
      loadState();
      loadLibrary(true);
      startPolling();
    };
    document.addEventListener('visibilitychange', () => document.hidden ? window.loliMusicPause() : window.loliMusicResume());
    window.addEventListener('blur', () => { if (miniSeekDragging) finishMiniSeek(); });
    loadLibrary(false);
    startPolling();
  </script>
</body>
</html>
